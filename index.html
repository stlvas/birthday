<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>A little birthday something</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Nunito:wght@400;600;700;800&family=Caveat:wght@500;700&display=swap" rel="stylesheet">

<!-- =================================================================== -->

<script>
const CONFIG = {

  // Her name
  name: "Nancy",

  // The little line on the cover screen
  coverSubtitle: "before you get your cake, you have to earn it 😏 a tiny quiz about us",

  // The button that starts the quiz
  startButton: "Okay, let's go",

  // ---- THE QUESTIONS ----
  // For each question:
  //   photo    → the picture shown ABOVE the question. Put the image file in the
  //              same folder and write its name, e.g. "q1.jpg" (or paste an https:// link).
  //   question → ask something about that photo
  //   options  → the answer choices
  //   correct  → which option is right, counting from 0 (first option = 0, second = 1, …)
  questions: [
    {
      photo: "q1.JPG",   // e.g. "q1.jpg"
      question: "What did this famous oplarxigos shouted during the revolution of 1821?",
      options: ["Aera", "Voitheia", "Epithesis", "Apo 'kei"],
      correct: 2
    },
    {
      photo: "q2.JPG",   // e.g. "q2.jpg"
      question: "What museum we went to see that day?",
      options: ["Ethniki Pinakothiki", "Goulandri", "Ethniki Glyptothiki", "Akropolis"],
      correct: 2
    },
    {
      photo: "q3.JPG",   // e.g. "q3.jpg"
      question: "How do I call this?",
      options: ["Milaraki", "Koufetaki", "Patataki", "Ntolmadaki"],
      correct: 1
    },
    {
      photo: "q4.JPG",   // e.g. "q4.jpg"
      question: "To which godess does this temple belong to?",
      options: ["Artemis", "Hera", "Athena", "Nancy (psonio)"],
      correct: 0
    }
  ],

  // ---- THE REVEAL (shown only when she gets all of them right) ----
  reveal: {
    headline: "Happy Birthday, beautiful",
    message: "You got them all right — of course you did. If you didn't, it's best to pretend you are dead. I wish you all the best and I can't wait for us to spend together the day tomorrow (and let's hope it won't rain)🤍",
    signoff: "— your pourpoulinaki",

    // YOUR PHOTO:
    // Easiest reliable option → put your image file next to this file and write its name, e.g. "us.jpg"
    // Or paste a public image link (https://...).
    // Leave the placeholder for now if you don't have it yet.
    photo: "final.JPG",                 // e.g. "us.jpg"  or  "https://..."
    photoCaption: "bitch I'm fabulous"
  },

  // Tiny nudge shown when an answer is wrong
  wrongHints: ["hmm, not quite 💭", "nope, try again 😋", "close! but no", "think harder, birthday girl 🎂"]
};
</script>

<!-- =================================================================== -->

<style>
  :root{
    --peach:#FFD8A8;
    --rose:#FF9EBB;
    --violet:#C9A7EB;
    --surface:#FFF8F3;
    --ink:#3A2A4D;
    --ink-soft:#6E5C82;
    --berry:#E8456B;
    --gold:#F2B705;
    --line:rgba(58,42,77,.12);
    --shadow:0 18px 50px -18px rgba(58,42,77,.45);
  }

  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Nunito",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 90% at 80% -10%, var(--peach) 0%, transparent 55%),
      radial-gradient(120% 100% at 10% 110%, var(--violet) 0%, transparent 55%),
      linear-gradient(160deg, #FFE9D6 0%, var(--rose) 100%);
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 18px;
    overflow-x:hidden;
  }

  /* floating hearts in the background */
  .sky{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .sky span{
    position:absolute;bottom:-40px;font-size:18px;opacity:.5;
    animation:rise linear infinite;
  }
  @keyframes rise{
    to{transform:translateY(-115dvh) rotate(40deg);opacity:0}
  }

  .stage{
    position:relative;z-index:1;width:100%;max-width:460px;
  }

  .card{
    background:var(--surface);
    border-radius:28px;
    padding:30px 26px 32px;
    box-shadow:var(--shadow);
    border:1px solid rgba(255,255,255,.6);
    text-align:center;
  }

  /* garland of hearts across the top */
  .garland{
    display:flex;justify-content:center;gap:10px;
    margin:0 auto 22px;min-height:26px;
  }
  .garland .bead{
    width:18px;height:18px;border-radius:50%;
    background:rgba(58,42,77,.12);
    position:relative;transition:transform .35s ease, background .35s ease;
  }
  .garland .bead.on{background:var(--berry);transform:scale(1.18)}
  .garland .bead.on::after{
    content:"";position:absolute;inset:-6px;border-radius:50%;
    box-shadow:0 0 14px 2px rgba(232,69,107,.55);
  }

  .eyebrow{
    font-family:"Caveat",cursive;font-size:26px;color:var(--berry);
    line-height:1;margin:0 0 6px;
  }
  h1{
    font-family:"Fraunces",serif;font-optical-sizing:auto;
    font-weight:600;font-size:clamp(30px,9vw,42px);
    line-height:1.05;margin:0 0 14px;letter-spacing:-.5px;
  }
  h1 em{font-style:italic;color:var(--berry)}
  .sub{color:var(--ink-soft);font-size:16px;line-height:1.5;margin:0 auto 26px;max-width:34ch}

  .btn{
    appearance:none;border:none;cursor:pointer;
    font-family:"Nunito",sans-serif;font-weight:800;font-size:17px;
    color:#fff;background:var(--berry);
    padding:15px 28px;border-radius:999px;
    box-shadow:0 10px 22px -8px rgba(232,69,107,.7);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn:hover{transform:translateY(-2px)}
  .btn:active{transform:translateY(0)}

  /* question screen */
  .qcount{
    font-family:"Caveat",cursive;font-size:22px;color:var(--ink-soft);margin:0 0 4px;
  }
  .question{
    font-family:"Fraunces",serif;font-weight:600;
    font-size:clamp(22px,6.2vw,27px);line-height:1.2;
    margin:0 0 22px;
  }
  .options{display:grid;gap:12px;text-align:left}
  .option{
    appearance:none;cursor:pointer;width:100%;
    font-family:"Nunito",sans-serif;font-weight:700;font-size:16px;color:var(--ink);
    background:#fff;border:2px solid var(--line);
    padding:15px 18px;border-radius:16px;
    transition:transform .12s ease, border-color .2s ease, background .2s ease;
  }
  .option:hover{border-color:var(--violet);transform:translateY(-1px)}
  .option.correct{border-color:#37b36b;background:#eafaf0}
  .option.wrong{border-color:var(--berry);background:#ffeef2;animation:shake .4s}
  @keyframes shake{
    0%,100%{transform:translateX(0)}
    20%,60%{transform:translateX(-7px)}
    40%,80%{transform:translateX(7px)}
  }
  .hint{
    font-family:"Caveat",cursive;font-size:24px;color:var(--berry);
    min-height:30px;margin:16px 0 0;
  }

  /* photo above each question */
  .qphoto{margin:0 0 18px}
  .qphoto img{
    display:block;width:100%;max-height:260px;object-fit:cover;
    border-radius:18px;box-shadow:var(--shadow);
  }
  .qphoto .ph{
    display:flex;align-items:center;justify-content:center;text-align:center;
    width:100%;height:150px;border-radius:18px;
    background:#f0e7df;color:var(--ink-soft);font-size:14px;
    padding:14px;border:2px dashed var(--line);
  }

  /* reveal screen */
  .polaroid{
    background:#fff;padding:12px 12px 0;border-radius:6px;
    box-shadow:var(--shadow);width:min(74%,260px);margin:0 auto 18px;
    transform:rotate(-3deg);
  }
  .polaroid img, .polaroid .ph{
    display:block;width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:3px;background:#f0e7df;
  }
  .polaroid .ph{
    display:flex;align-items:center;justify-content:center;
    color:var(--ink-soft);font-size:14px;text-align:center;padding:14px;
  }
  .polaroid .cap{
    font-family:"Caveat",cursive;font-size:22px;color:var(--ink);
    padding:8px 4px 12px;
  }
  .message{color:var(--ink-soft);font-size:17px;line-height:1.6;margin:0 auto 14px;max-width:36ch}
  .signoff{font-family:"Caveat",cursive;font-size:26px;color:var(--berry);margin:0 0 22px}
  .replay{
    background:none;border:none;cursor:pointer;color:var(--ink-soft);
    font-family:"Nunito",sans-serif;font-weight:700;font-size:14px;text-decoration:underline;
  }

  /* screen transitions */
  .screen{display:none}
  .screen.active{display:block;animation:fadeIn .5s ease both}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:5}

  :focus-visible{outline:3px solid var(--violet);outline-offset:2px}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important;animation-iteration-count:1 !important}
    .sky{display:none}
  }
</style>
</head>
<body>
  <div class="sky" id="sky" aria-hidden="true"></div>
  <canvas id="confetti" aria-hidden="true"></canvas>

  <div class="stage">
    <div class="card">
      <div class="garland" id="garland" aria-hidden="true"></div>

      <!-- COVER -->
      <section class="screen active" id="cover">
        <p class="eyebrow">psst…</p>
        <h1>Hey <em id="coverName">you</em></h1>
        <p class="sub" id="coverSub"></p>
        <button class="btn" id="startBtn"></button>
      </section>

      <!-- QUIZ -->
      <section class="screen" id="quiz" aria-live="polite">
        <p class="qcount" id="qcount"></p>
        <div class="qphoto" id="qphoto"></div>
        <p class="question" id="qtext"></p>
        <div class="options" id="options"></div>
        <p class="hint" id="hint"></p>
      </section>

      <!-- REVEAL -->
      <section class="screen" id="reveal">
        <p class="eyebrow">you did it 🎉</p>
        <h1 id="revealHeadline"></h1>
        <div class="polaroid" id="polaroid"></div>
        <p class="message" id="revealMessage"></p>
        <p class="signoff" id="revealSignoff"></p>
        <button class="replay" id="replayBtn">play again</button>
      </section>
    </div>
  </div>

<script>
(function(){
  const $ = s => document.querySelector(s);

  // ----- floating hearts -----
  const sky = $("#sky");
  const hearts = ["🤍","💕","💛","🎈","✨"];
  for(let i=0;i<14;i++){
    const s=document.createElement("span");
    s.textContent=hearts[i%hearts.length];
    s.style.left=Math.random()*100+"%";
    s.style.fontSize=(14+Math.random()*22)+"px";
    s.style.animationDuration=(9+Math.random()*10)+"s";
    s.style.animationDelay=(-Math.random()*15)+"s";
    sky.appendChild(s);
  }

  // ----- cover -----
  $("#coverName").textContent = CONFIG.name;
  $("#coverSub").textContent = CONFIG.coverSubtitle;
  $("#startBtn").textContent = CONFIG.startButton;

  // ----- garland beads (one per question) -----
  const garland = $("#garland");
  CONFIG.questions.forEach(()=>{
    const b=document.createElement("div"); b.className="bead"; garland.appendChild(b);
  });
  const beads=[...garland.children];

  // ----- screen switching -----
  function show(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    $("#"+id).classList.add("active");
  }

  // ----- quiz logic -----
  let idx=0;
  const qcount=$("#qcount"), qphoto=$("#qphoto"), qtext=$("#qtext"), optionsEl=$("#options"), hint=$("#hint");

  function renderQuestion(){
    hint.textContent="";
    const q=CONFIG.questions[idx];
    qcount.textContent=`question ${idx+1} of ${CONFIG.questions.length}`;

    qphoto.innerHTML="";
    if(q.photo && q.photo.trim()!==""){
      const img=document.createElement("img");
      img.src=q.photo; img.alt="";
      qphoto.appendChild(img);
    }else{
      const ph=document.createElement("div");
      ph.className="ph";
      ph.textContent="📷 add a photo for this question — set its photo at the top of the file";
      qphoto.appendChild(ph);
    }

    qtext.textContent=q.question;
    optionsEl.innerHTML="";
    q.options.forEach((text,i)=>{
      const btn=document.createElement("button");
      btn.className="option";
      btn.textContent=text;
      btn.addEventListener("click",()=>answer(i,btn));
      optionsEl.appendChild(btn);
    });
  }

  function answer(i,btn){
    const q=CONFIG.questions[idx];
    if(i===q.correct){
      btn.classList.add("correct");
      beads[idx].classList.add("on");
      [...optionsEl.children].forEach(b=>b.disabled=true);
      setTimeout(()=>{
        idx++;
        if(idx<CONFIG.questions.length){ renderQuestion(); }
        else{ doReveal(); }
      },650);
    }else{
      btn.classList.add("wrong");
      const hints=CONFIG.wrongHints;
      hint.textContent=hints[Math.floor(Math.random()*hints.length)];
      setTimeout(()=>btn.classList.remove("wrong"),450);
    }
  }

  // ----- reveal -----
  function doReveal(){
    show("reveal");
    $("#revealHeadline").textContent=CONFIG.reveal.headline;
    $("#revealMessage").textContent=CONFIG.reveal.message;
    $("#revealSignoff").textContent=CONFIG.reveal.signoff;

    const pol=$("#polaroid");
    pol.innerHTML="";
    if(CONFIG.reveal.photo && CONFIG.reveal.photo.trim()!==""){
      const img=document.createElement("img");
      img.src=CONFIG.reveal.photo; img.alt=CONFIG.reveal.photoCaption||"";
      pol.appendChild(img);
    }else{
      const ph=document.createElement("div");
      ph.className="ph";
      ph.textContent="📷 your photo goes here — set reveal.photo at the top of the file";
      pol.appendChild(ph);
    }
    const cap=document.createElement("div");
    cap.className="cap"; cap.textContent=CONFIG.reveal.photoCaption||"";
    pol.appendChild(cap);

    fireConfetti();
  }

  $("#startBtn").addEventListener("click",()=>{ idx=0; beads.forEach(b=>b.classList.remove("on")); renderQuestion(); show("quiz"); });
  $("#replayBtn").addEventListener("click",()=>{ idx=0; beads.forEach(b=>b.classList.remove("on")); show("cover"); });

  // ----- confetti (no external library) -----
  const canvas=$("#confetti"), ctx=canvas.getContext("2d");
  let parts=[], raf=null;
  function size(){ canvas.width=innerWidth; canvas.height=innerHeight; }
  size(); addEventListener("resize",size);
  const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;

  function fireConfetti(){
    if(reduce) return;
    const colors=["#E8456B","#F2B705","#FF9EBB","#C9A7EB","#37b36b"];
    parts=[];
    for(let i=0;i<140;i++){
      parts.push({
        x:Math.random()*canvas.width, y:-20-Math.random()*canvas.height*0.3,
        r:5+Math.random()*7, c:colors[i%colors.length],
        vy:2+Math.random()*4, vx:-2+Math.random()*4,
        rot:Math.random()*6, vr:-.2+Math.random()*.4
      });
    }
    if(!raf) loop();
    setTimeout(()=>{ parts=[]; },5000);
  }
  function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    parts.forEach(p=>{
      p.y+=p.vy; p.x+=p.vx; p.rot+=p.vr;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.c; ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.6);
      ctx.restore();
    });
    parts=parts.filter(p=>p.y<canvas.height+30);
    if(parts.length){ raf=requestAnimationFrame(loop); } else { ctx.clearRect(0,0,canvas.width,canvas.height); raf=null; }
  }
})();
</script>
</body>
</html>
